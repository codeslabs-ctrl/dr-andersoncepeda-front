<div class="login-page">
  <div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo">
        <img src="assets/logos/clinica/logo.png" alt="Codes-Labs Logo" class="logo-image">
        <p>Radioterapia y Medicina Nuclear</p>
      </div>
    </div>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input 
          type="text" 
          id="username" 
          formControlName="username" 
          placeholder="Ingresa tu usuario"
          [class.error]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
        >
        <div *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched" class="error-message">
          El usuario es requerido
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="password-input-container">
          <input 
            [type]="showPassword ? 'text' : 'password'" 
            id="password" 
            formControlName="password" 
            placeholder="Ingresa tu contraseña"
            [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            class="password-input"
          >
          <button 
            type="button" 
            class="password-toggle" 
            (click)="togglePasswordVisibility()"
            [title]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          >
            <span class="password-icon">{{ showPassword ? '🙈' : '👁️' }}</span>
          </button>
        </div>
        <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error-message">
          La contraseña es requerida
        </div>
      </div>

      <button 
        type="submit" 
        class="login-btn" 
        [disabled]="loginForm.invalid || isLoading || isRateLimited"
        [class.loading]="isLoading"
        [class.rate-limited]="isRateLimited"
      >
        <span *ngIf="!isLoading && !isRateLimited">Iniciar Sesión</span>
        <span *ngIf="isLoading">Iniciando...</span>
        <span *ngIf="isRateLimited">Bloqueado ({{ getFormattedTimeRemaining() }})</span>
      </button>

      <div class="forgot-password-container">
        <a routerLink="/forgot-password" class="forgot-password-link">
          ¿Olvidaste tu contraseña?
        </a>
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>
    </form>

    <div class="copyright">
      <p>&copy; {{ currentYear }} <a href="https://codes-labs.com" target="_blank" rel="noopener noreferrer" class="copyright-link">Codes-Labs</a>. Todos los derechos reservados.</p>
    </div>
  </div>
  </div>
</div>
